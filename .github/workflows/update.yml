name: Actualizar Playlist M3U

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar Scraper Multi-Portal
        run: python scraper.py

      - name: Verificar archivos
        run: |
          ls -lah playlist.m3u metadata.json stats.json 2>/dev/null || true
          head -10 playlist.m3u 2>/dev/null || true
          cat stats.json 2>/dev/null || true

      - name: Commit y Push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add -f playlist.m3u metadata.json stats.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

