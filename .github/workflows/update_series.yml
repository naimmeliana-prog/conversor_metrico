name: Actualizar Series Semanal

on:
  schedule:
    - cron: '0 4 * * 0' # Cada domingo a las 04:00 AM UTC
  workflow_dispatch:

jobs:
  update-series:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar Scraper de Series
        run: python scraper.py --only-series

      - name: Verificar archivos
        run: |
          ls -lah playlist_series.m3u metadata.json stats.json 2>/dev/null || true

      - name: Commit y Push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git fetch origin main
          git reset --mixed origin/main
          git add -f playlist.m3u playlist_tv.m3u playlist_movies.m3u playlist_series.m3u metadata.json stats.json user_filters.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto-update Series $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
