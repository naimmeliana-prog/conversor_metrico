name: Actualizar Peliculas

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-movies:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar Scraper de Peliculas
        run: python scraper.py --only-movies

      - name: Verificar archivos
        run: |
          ls -lah playlist_movies.m3u metadata.json stats.json 2>/dev/null || true

      - name: Commit y Push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git fetch origin main
          git reset --mixed origin/main
          git add -f playlist.m3u playlist_tv.m3u playlist_movies.m3u playlist_series.m3u metadata.json stats.json user_filters.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto-update Peliculas"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
