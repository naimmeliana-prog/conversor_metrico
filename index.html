<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Multi-Portal Dashboard</title>
    <style>
        :root { --accent: #e94560; --bg: #0a0a0f; --card: #16213e; --text: #e8e8f0; --border: #2a2a4a; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; }
        header { background: #1a1a2e; padding: 1rem; border-bottom: 1px solid var(--border); sticky; top: 0; z-index: 100; }
        .filters { background: rgba(10,10,15,0.9); padding: 10px; position: sticky; top: 70px; z-index: 90; display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
        .ms-wrap { position: relative; }
        .ms-dropdown { display: none; position: absolute; top: 100%; left: 0; background: var(--card); border: 1px solid var(--border); min-width: 200px; max-height: 300px; overflow-y: auto; z-index: 1000; padding: 10px; border-radius: 8px; }
        .ms-dropdown.open { display: block; }
        .ms-opt { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 10px; font-size: 0.8rem; }
        .badge { font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; background: var(--accent); }
        .btn-ui { background: var(--border); border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-ui:hover { background: var(--accent); }
    </style>
</head>
<body>

<header>
    <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
        <h2>📡 Multi-IPTV</h2>
        <button class="btn-ui" onclick="openCfg()">⚙️ Configuración</button>
    </div>
</header>

<div class="filters" id="filter-bar">
    <input type="text" id="search" placeholder="Buscar..." style="padding: 8px; border-radius: 5px; border: 1px solid var(--border); background: #1a1a2e; color: white;">
    
    <div class="ms-wrap">
        <button class="btn-ui" onclick="toggleMs('lang')">🌍 Idioma <span id="lang-count"></span></button>
        <div id="lang-dd" class="ms-dropdown"></div>
    </div>

    <div class="ms-wrap">
        <button class="btn-ui" onclick="toggleMs('ctry')">🚩 País <span id="ctry-count"></span></button>
        <div id="ctry-dd" class="ms-dropdown"></div>
    </div>
</div>

<div class="main-content">
    <div id="grid" class="grid"></div>
</div>

<script>
const LS_KEY = 'iptv_cfg_v3';
let allItems = [];
let msState = { lang: new Set(), ctry: new Set() };

async function loadMetadata() {
    const cfg = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    if (!cfg.ghUser) return;
    
    const url = `https://raw.githubusercontent.com/${cfg.ghUser}/${cfg.ghRepo}/main/metadata.json`;
    try {
        const r = await fetch(url + '?t=' + Date.now());
        const data = await r.json();
        allItems = data.items || [];
        
        buildFilter('lang', 'lang');
        buildFilter('ctry', 'country');
        applyFilters();
    } catch(e) { console.error("Error cargando datos", e); }
}

function buildFilter(id, field) {
    const counts = {};
    allItems.forEach(i => {
        const val = i[field] || 'OTHER';
        counts[val] = (counts[val] || 0) + 1;
    });

    const dd = document.getElementById(`${id}-dd`);
    const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
    
    dd.innerHTML = sorted.map(([val, count]) => `
        <div class="ms-opt">
            <input type="checkbox" id="${id}-${val}" onchange="toggleOpt('${id}', '${val}')">
            <label for="${id}-${val}">${val} (${count})</label>
        </div>
    `).join('');
}

function toggleMs(id) {
    document.getElementById(`${id}-dd`).classList.toggle('open');
}

function toggleOpt(id, val) {
    if (msState[id].has(val)) msState[id].delete(val);
    else msState[id].add(val);
    document.getElementById(`${id}-count`).textContent = msState[id].size || '';
    applyFilters();
}

function applyFilters() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = allItems.filter(i => {
        const matchesSearch = i.name.toLowerCase().includes(q);
        const matchesLang = msState.lang.size === 0 || msState.lang.has(i.lang);
        const matchesCtry = msState.ctry.size === 0 || msState.ctry.has(i.country);
        return matchesSearch && matchesLang && matchesCtry;
    });

    render(filtered);
}

function render(items) {
    const grid = document.getElementById('grid');
    grid.innerHTML = items.slice(0, 100).map(i => `
        <div class="card">
            <img src="${i.logo || ''}" onerror="this.src='https://via.placeholder.com/150x225?text=IPTV'">
            <div class="card-info">
                <div style="font-weight: bold; margin-bottom: 5px;">${i.name}</div>
                <span class="badge">${i.lang}</span>
                <span class="badge" style="background: #34495e">${i.country}</span>
            </div>
        </div>
    `).join('');
}

// Inicializar
loadMetadata();
document.getElementById('search').oninput = applyFilters;
</script>
</body>
</html>
